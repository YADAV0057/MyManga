name: Auto-Harvest Concepts
on:
  push:
    paths:
      - 'queue.txt'

permissions:
  contents: write

jobs: 
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - run: npm install axios xml2js
      
      - name: Run Harvester
        run: node js/parser/dictionary/harvester.js
      
      - name: Commit changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          # Add the updated files
          git add js/parser/dictionary/properties.js
          
          # Clear the queue file after processing to prevent re-harvesting
          echo "" > queue.txt
          git add queue.txt
          
          # Commit and push if there are changes
          git commit -m "Auto-harvested new concepts and cleared queue" || echo "No changes to commit"
          git push
