name: Backfill Properties MoodWeights 
on:
  workflow_dispatch: {}
  # Manual trigger only — this is a maintenance script you rerun after
  # editing properties.js or MoodConfig.js, not something that should fire
  # on every push like harvest.yml does.

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: npm install

      - name: Run properties.js moodWeights backfill
        run: node js/parser/dictionary/backfillPropertiesMoodWeights.js

      - name: Commit changes
        if: always()
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'

          git add js/parser/dictionary/properties.js
          # The script also writes a timestamped .bak file — commit it too
          # so the pre-backfill version is recoverable from git history,
          # same safety net the script gives you locally.
          git add js/parser/dictionary/properties.pre-moodweights-backfill.*.js.bak

          git commit -m "Backfill moodWeights for properties.js" || echo "No changes to commit"
          git push
