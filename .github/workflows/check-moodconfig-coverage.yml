name: Check MoodConfig Coverage
on:
  workflow_dispatch: {}
  # Manual, read-only report — this script never writes any file, so there's
  # nothing to commit here (unlike the two backfill workflows). Its console
  # output is piped into the GitHub Actions run summary below so you can
  # read the full report right on the run's page in the browser, no need to
  # open raw logs or have a terminal.

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: npm install

      - name: Run MoodConfig coverage check
        run: |
          set +e
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          node js/parser/dictionary/checkMoodConfigCoverage.js >> "$GITHUB_STEP_SUMMARY" 2>&1
          status=$?
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit $status
