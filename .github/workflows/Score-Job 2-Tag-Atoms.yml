name: Score Job 2 Tag/Theme Atoms  (worker + judge)
on:
  workflow_dispatch:
    inputs:
      taxonomy_path:
        description: 'Path (in-repo) to the taxonomy JSON file to score'
        required: true
        default: 'js/parser/dictionary/vectorEngine/job2_taxonomy_input.json'
      sample_rate:
        description: 'Fraction of items the judge re-scores (0-1) — bumped default since results now come from more than one model family'
        required: false
        default: '0.25'
      run_judge:
        description: 'Run the judge pass this trigger? (set true only once worker is fully done)'
        required: false
        default: 'false'
  schedule:
    # Runs daily after the free-tier RPD quotas reset (Google resets at
    # midnight Pacific). Each lane tracks and self-caps its own daily
    # budget — see scoreTagAtoms.worker.js — so this never over-runs.
    - cron: '5 8 * * *'

permissions:
  contents: write

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: npm install

      - name: Worker pass (multi-lane — Gemini, GitHub Models, Groq, OpenRouter)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_ACCT_KEY: ${{ secrets.GEMINI }}
          MONKEY_ACCT_KEY: ${{ secrets.MONKEY }}
          GITHUB_MODELS_KEY: ${{ secrets.GIT_HUB_KEY }}
          GROQ_API_KEY: ${{ secrets.GORQ }}
        run: node js/parser/dictionary/vectorEngine/scoreTagAtoms.worker.js "${{ github.event.inputs.taxonomy_path || 'js/parser/dictionary/vectorEngine/job2_taxonomy_input.json' }}"

      - name: Judge pass (Cerebras QCs a sample)
        if: github.event.inputs.run_judge == 'true'
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: node js/parser/dictionary/vectorEngine/judgeTagAtoms.js "${{ github.event.inputs.sample_rate || '0.25' }}"

      - name: Commit results
        if: always()
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'

          git add js/parser/dictionary/vectorEngine/job2_scored_raw.json \
                  js/parser/dictionary/vectorEngine/job2_progress.json \
                  js/parser/dictionary/vectorEngine/job2_final.json \
                  js/parser/dictionary/vectorEngine/job2_review_queue.json

          git commit -m "Job 2: multi-lane score run ($(date -u +%Y-%m-%dT%H:%M:%SZ))" || echo "No changes to commit"
          git push
