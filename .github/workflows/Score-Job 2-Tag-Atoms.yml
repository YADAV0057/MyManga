name: Score Job 2 Tag/Theme Atoms  (worker + judge)
on:
  workflow_dispatch:
    inputs:
      taxonomy_path:
        description: 'Path (in-repo) to the taxonomy JSON file to score'
        required: true
        default: 'js/parser/dictionary/vectorEngine/job2_taxonomy_input.json'
      sample_rate:
        description: 'Fraction of items the judge re-scores (0-1)'
        required: false
        default: '0.15'
# Manual trigger only — same reasoning as every other job in this
# family (backfill-moodweights.yml etc.): this costs real API calls and
# real money, it should never auto-fire on push.

permissions:
  contents: write

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: npm install

      - name: Worker pass (4-lane round robin — GitHub Models, Groq, 2x OpenRouter)
        env:
          # Lane 1: GitHub Models. Requires a fine-grained PAT with the
          # models:read scope — a plain classic token will 403. GitHub
          # Models retires 2026-07-30; fine for this run, don't depend on
          # it past that date.
          GIT_HUB_KEY: ${{ secrets.GIT_HUB_KEY }}
          # Lane 2: Groq. Secret name kept as GORQ (typo, do not rename
          # without also updating scoreTagAtoms.worker.js).
          GORQ: ${{ secrets.GORQ }}
          # Lane 3: OpenRouter account #1.
          OPEN_ROUTER: ${{ secrets.OPEN_ROUTER }}
          # Lane 4: OpenRouter account #2. Secret name kept as
          # YOUR_SECERET_NAME (naming accident, GitHub secrets can't be
          # renamed in place — do not rename without also updating
          # scoreTagAtoms.worker.js).
          YOUR_SECERET_NAME: ${{ secrets.YOUR_SECERET_NAME }}
        run: node js/parser/dictionary/vectorEngine/scoreTagAtoms.worker.js "${{ github.event.inputs.taxonomy_path }}"

      - name: Judge pass (Cerebras QCs a sample)
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: node js/parser/dictionary/vectorEngine/judgeTagAtoms.js "${{ github.event.inputs.sample_rate }}"

      - name: Commit results
        if: always()
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'

          git add js/parser/dictionary/vectorEngine/job2_scored_raw.json \
                  js/parser/dictionary/vectorEngine/job2_final.json \
                  js/parser/dictionary/vectorEngine/job2_review_queue.json

          git commit -m "Job 2: score tag/theme atoms (worker: GitHub Models+Groq+OpenRouter x2, judge: Cerebras)" || echo "No changes to commit"
          git push
