name: Auto-Expand MoodConfig + Backfill
on:
  workflow_dispatch: {}
  # Manual trigger only. This is the full pipeline in one click:
  #   1. autoExpandMoodConfig.js  — infers moodWeights vectors for every
  #      missing genre/theme/demographic name (from co-occurring known
  #      signals already in properties.js/harvested_knowledge.js) and
  #      writes them into MoodConfig.js.
  #   2. backfillPropertiesMoodWeights.js — applies MoodConfig.js's
  #      (now-expanded) tables to properties.js's concepts.
  #   3. backfillMoodWeights.js — same, for harvested_knowledge.js.
  # Run this any time Check MoodConfig Coverage shows a large "missing"
  # count you don't want to hand-type entries for one at a time.

permissions:
  contents: write

jobs:
  expand-and-backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: npm install

      - name: Auto-expand MoodConfig.js coverage
        run: node js/parser/dictionary/autoExpandMoodConfig.js

      - name: Backfill properties.js with the expanded tables
        run: node js/parser/dictionary/backfillPropertiesMoodWeights.js

      - name: Backfill harvested_knowledge.js with the expanded tables
        run: node js/parser/dictionary/backfillMoodWeights.js

      - name: Commit changes
        if: always()
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'

          git add js/parser/dictionary/MoodConfig.js
          git add js/parser/dictionary/MoodConfig.pre-autoexpand.*.js.bak
          git add js/parser/dictionary/properties.js
          git add js/parser/dictionary/properties.pre-moodweights-backfill.*.js.bak
          git add js/parser/dictionary/harvested_knowledge.js

          git commit -m "Auto-expand MoodConfig.js coverage and backfill moodWeights" || echo "No changes to commit"
          git push
