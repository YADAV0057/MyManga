<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaMood 🔮 - Discovery Portal</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/cards.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- BUGFIX: style.css already defines #loading-bar / .is-loading (the thin
     progress bar during search), and search.js's triggerSearch() calls
     document.getElementById('loading-bar').classList.add('is-loading')
     BEFORE its own try/catch even starts — this element was missing from
     the page, so that line threw a TypeError on every single call and
     killed triggerSearch() instantly, before it did anything else. That's
     why search, mood/vibe buttons, and refresh all appeared totally dead. -->
<div id="loading-bar"></div>

<!-- =========================
    TOP BAR
========================= -->
<nav class="topbar">
    <span class="topbar-brand">MangaMood 🔮</span>

    <div class="view-toggle">
        <button id="nav-favorites-btn" class="tab-btn">❤️ My List</button>
    </div>
</nav>

<!-- =========================
    HEADER SEARCH
========================= -->
<header>

    <h2 class="tagline">What are you in the mood for today?</h2>

    <div class="search-container">

        <input
            id="manga-search-input"
            type="text"
            placeholder="e.g. Cyberpunk romance, Dark revenge, Wholesome vibe..."
        >

        <button id="search-submit-btn" class="vibe-btn" style="margin-top:10px;width:100%;">
            Find My Vibe
        </button>

    </div>

</header>

<!-- =========================
    🔮 MOOD ANALYZER
========================= -->

<section id="mood-preview-board" class="mood-analyzer container">

    <div class="mood-analyzer-header">
        <h2>🔮 Mood Analyzer</h2>
        <p>See exactly how MangaMood reads your search — moods, genres, and the API route it'll take.</p>
    </div>

    <input
        id="parser-input"
        class="mood-analyzer-input"
        type="text"
        placeholder="Try: Make me cry, dark revenge, wholesome romance..."
    >

    <button id="parser-test-btn" class="mood-analyzer-btn">
        Analyze Mood
    </button>

    <div id="parser-output" class="mood-analyzer-output"></div>

</section>

<!-- =========================
    MAIN APP
========================= -->
<main class="container">

    <!-- MOOD TAGS -->
    <section class="vibe-panel-container">

        <div id="rotating-vibes" class="vibe-panel"></div>

        <button class="vibe-btn" id="more-btn" style="margin-top:20px;">
            + Show All Moods
        </button>

        <div id="extra-tags" class="hidden-tags"></div>

    </section>

    <!-- RESULTS -->
    <section id="results-area">

        <div class="results-header">

            <h2 id="results-title">✨ Your Curated Picks</h2>

            <button id="refresh-btn" class="vibe-btn refresh-btn" style="display:none;">
                🎲 Reroll
            </button>

        </div>

        <div class="grid" id="community-grid"></div>

    </section>

</main>

<!-- =========================
    FOOTER
========================= -->
<footer>
    <p>Data powered by AniList, MangaDex & Kitsu APIs</p>
</footer>

<!-- =========================
    SCRIPT
========================= -->
<script type="module" src="./js/main.js"></script>

</body>
</html>
