<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaMood 📖</title>
    <!-- Link to your CSS file -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Programmable Search Engine Script -->
    <script async src="https://cse.google.com/cse.js?cx=22bfe619cd33a4c74"></script>
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>MangaMood 📖</h1>
        <div class="search-container">
            <!-- Google Search Box -->
            <div class="gcse-searchbox-only"></div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        
        <!-- Mood Selector Panel -->
        <section class="vibe-panel">
            <button class="vibe-btn" onclick="triggerSearch('sad manga family dynamics')">😭 I need a cry</button>
            <button class="vibe-btn" onclick="triggerSearch('hype action manga')">🔥 Give me Hype</button>
            <button class="vibe-btn" id="more-btn" onclick="toggleTags()">+ More</button>
            
            <div id="extra-tags" class="hidden-tags">
                <button class="vibe-btn" onclick="triggerSearch('slice of life chill manga')">🍵 Just chill</button>
                <button class="vibe-btn" onclick="triggerSearch('mystery thriller manga')">🕵️ Mystery</button>
                <button class="vibe-btn" onclick="triggerSearch('sweet romance manga')">💕 Romance</button>
            </div>
        </section>

        <!-- Results Area -->
        <section id="results-area">
            <div id="community-picks">
                <h2>⭐ Community Favorites</h2>
                <div class="grid" id="community-grid">
                    <!-- Placeholder: Firebase picks will load here later -->
                    <div class="card"><h3>Example Pick</h3><p>Community favorite will appear here.</p></div>
                </div>
            </div>

            <div id="search-results">
                <h2>Search Results</h2>
                <!-- Google Search Results injected here -->
                <div class="gcse-searchresults-only"></div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script>
        // Toggle More/Less buttons
        function toggleTags() {
            const extra = document.getElementById('extra-tags');
            const btn = document.getElementById('more-btn');
            if (extra.style.display === "flex") {
                extra.style.display = "none";
                btn.innerText = "+ More";
            } else {
                extra.style.display = "flex";
                extra.style.gap = "12px";
                btn.innerText = "- Less";
            }
        }

        // Logic to trigger the Google Search box programmatically
        function triggerSearch(query) {
            const searchInput = document.querySelector('input.gsc-input');
            if (searchInput) {
                searchInput.value = query;
                const searchBtn = document.querySelector('button.gsc-search-button');
                if (searchBtn) searchBtn.click();
            }
            // Scroll to results
            document.getElementById('search-results').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
