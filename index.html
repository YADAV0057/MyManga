<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaMood 🔮 - Discovery Portal</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/cards.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- =========================
    TOP BAR
========================= -->
<nav class="topbar">
    <span class="topbar-brand">MangaMood 🔮</span>

    <div class="view-toggle">
        <button id="nav-discover-btn" class="tab-btn active-view">🔍 Discover</button>
        <button id="nav-favorites-btn" class="tab-btn">❤️ My List</button>
    </div>
</nav>

<!-- =========================
    HEADER SEARCH
========================= -->
<header>

    <h2 class="tagline">What are you in the mood for today?</h2>

    <div class="search-container">

        <input
            id="manga-search-input"
            type="text"
            placeholder="e.g. Cyberpunk romance, Dark revenge, Wholesome vibe..."
        >

        <button id="search-submit-btn" class="vibe-btn" style="margin-top:10px;width:100%;">
            Find My Vibe
        </button>

    </div>

</header>

<!-- =========================
    🧠 AI MOOD PREVIEW BOARD
========================= -->

<section id="mood-preview-board" class="container" style="margin-top:20px;">

    <h2 style="margin-bottom:10px;">🧠 Mood Intelligence Preview</h2>

    <p style="opacity:0.7;margin-bottom:15px;">
        Live breakdown of how your search is understood
    </p>

    <!-- INPUT -->
    <input
        id="parser-input"
        type="text"
        placeholder="Try: Make me cry, dark revenge, wholesome romance..."
        style="
            width:100%;
            padding:12px;
            border-radius:10px;
            border:none;
            outline:none;
            margin-bottom:10px;
        "
    >

    <button
        id="parser-test-btn"
        style="
            width:100%;
            padding:12px;
            border-radius:10px;
            border:none;
            cursor:pointer;
            background:#00ff9d;
            font-weight:bold;
        ">
        Analyze Mood
    </button>

    <!-- OUTPUT DASHBOARD -->
    <div id="parser-output" style="margin-top:20px;"></div>

</section>

<!-- =========================
    MAIN APP
========================= -->
<main class="container">

    <!-- MOOD TAGS -->
    <section class="vibe-panel-container">

        <div id="rotating-vibes" class="vibe-panel"></div>

        <button class="vibe-btn" id="more-btn" style="margin-top:20px;">
            + Show All Moods
        </button>

        <div id="extra-tags" class="hidden-tags"></div>

    </section>

    <!-- RESULTS -->
    <section id="results-area">

        <div class="results-header">

            <h2 id="results-title">✨ Your Curated Picks</h2>

            <button id="refresh-btn" class="vibe-btn refresh-btn" style="display:none;">
                🎲 Reroll
            </button>

        </div>

        <div class="grid" id="community-grid"></div>

    </section>

</main>

<!-- =========================
    FOOTER
========================= -->
<footer>
    <p>Data powered by AniList, MangaDex & Kitsu APIs</p>
</footer>

<!-- =========================
    SCRIPT
========================= -->
<script type="module" src="./js/main.js"></script>

</body>
</html>
