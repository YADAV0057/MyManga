<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaMood 📖 - Discovery Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> 
    <!-- Loading Bar Indicator -->
    <div id="loading-bar"></div>

    <!-- Header Section -->
    <header>
        <h1>MangaMood 📖</h1>
        <div class="search-container">
            <!-- Native Input Bridge -->
            <input type="text" id="manga-search-input" placeholder="Search for a title or vibe...">
            <button id="search-submit-btn" class="vibe-btn" style="background: var(--accent); color: white; margin-top: 10px; width: 100%;">Discover</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Mood Selector Panel with Rotating UI -->
        <section class="vibe-panel-container">
            <div id="rotating-vibes" class="vibe-panel"></div>
            <button class="vibe-btn" id="more-btn" onclick="toggleTags()" style="margin-top: 15px; border: 1px solid var(--accent); background: transparent; color: var(--accent);">+ Show All 50 Moods</button>
            <div id="extra-tags" class="hidden-tags" style="margin-top: 20px;"></div>
        </section>

        <!-- Results Area -->
        <section id="results-area">
            <div id="community-picks">
                <h2>⭐ Mood Discoveries</h2>
                <div class="grid" id="community-grid">
                    <!-- Dynamic Manga Cards Inject Here -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>Data powered by MangaDex, AniList, and MyAnimeList.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
