<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaMood 🔮 - Discovery Portal</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Bar Indicator -->
    <div id="loading-bar"></div>

    <!-- Header Section -->
    <header>
        <h1>MangaMood 🔮</h1>
        <div class="search-container">
            <input type="text" id="manga-search-input" placeholder="What are you in the mood for today?">
            
            <!-- Removed hardcoded colors so it uses your beautiful glassmorphism CSS -->
            <button id="search-submit-btn" class="vibe-btn" style="margin-top: 10px; width: 100%;">
                Find My Vibe
            </button>
            
            <p style="font-size: 0.85rem; color: var(--text-muted); text-align: center; margin-top: 10px;">
                ✨ <b>Pro-tip:</b> Mix tags like 'Cyberpunk, Romance, status:completed'
            </p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Mood Selector Panel -->
        <section class="vibe-panel-container">
            <div id="rotating-vibes" class="vibe-panel"></div>
            
            <!-- Removed hardcoded borders so it perfectly matches the other pill buttons -->
            <button class="vibe-btn" id="more-btn" onclick="toggleTags()" style="margin-top: 20px;">
                + Show All 50 Moods
            </button>
            
            <div id="extra-tags" class="hidden-tags" style="margin-top: 20px;"></div>
        </section>

        <!-- Results Area -->
        <section id="results-area">
            <div class="results-header">
                <h2>✨ Your Curated Picks</h2>
                <button id="refresh-btn" class="vibe-btn refresh-btn" style="display: none;">
                    🎲 Reroll
                </button>
            </div>
            
            <div class="grid" id="community-grid">
                <!-- Dynamic Manga Cards (and Skeletons) Inject Here -->
            </div>
        </section>
    </main>

    <footer>
        <p>Data powered by the AniList, MangaDex & Kitsu API Waterfall.</p>
    </footer>

    <!-- Firebase and main app logic -->
    <script type="module" src="./js/main.js"></script>
</body>
</html>
