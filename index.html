<header>
    <h1>MangaMood 📖</h1>
    <div class="search-container">
        <input type="text" id="main-search" placeholder="Search for your next adventure...">
    </div>
</header>

<main class="container">
    <section class="vibe-panel">
        <button class="vibe-btn" onclick="filterByMood('sad')">😭 I need a cry</button>
        <button class="vibe-btn" onclick="filterByMood('hype')">🔥 Give me Hype</button>
        <button class="vibe-btn" id="more-btn" onclick="toggleTags()">+ More</button>
        
        <!-- These stay hidden until clicked -->
        <div id="extra-tags" class="hidden-tags">
            <button class="vibe-btn" onclick="filterByMood('chill')">🍵 Just chill</button>
            <button class="vibe-btn" onclick="filterByMood('mystery')">🕵️ Mystery</button>
            <button class="vibe-btn" onclick="filterByMood('romance')">💕 Romance</button>
        </div>
    </section>
</main>

<script>
    function toggleTags() {
        const extra = document.getElementById('extra-tags');
        const btn = document.getElementById('more-btn');
        if (extra.style.display === "flex") {
            extra.style.display = "none";
            btn.innerText = "+ More";
        } else {
            extra.style.display = "flex";
            extra.style.gap = "12px";
            btn.innerText = "- Less";
        }
    }
</script>
